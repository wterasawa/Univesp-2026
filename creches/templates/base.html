<!doctype html>
<html lang="pt-br">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Sistema de Vagas - {% block page_title %}{% endblock page_title %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<header class="bg-dark text-white p-3" class="no-print">
    <div class="container">
        <h3 class="m-0">Sistema de Vagas</h3>
    </div>
</header>

<body>
    
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

    <main>
        {% block content %}{% endblock content %}
        {% block scripts %}{% endblock %}
    </main>

</body>

<footer>
    {% if messages %}
        <div id="msg-rodape" style="position: fixed; bottom: 20px; width: 100%; text-align: center; z-index: 1000;">
            {% for message in messages %}
                <div class="alert alert-success d-inline-block shadow-lg">
                    {{ message }}
                </div>
            {% endfor %}
        </div>

        <script>
            // Espera 3 segundos (2000ms) e redireciona ou apenas esconde
            setTimeout(function() {
                const msg = document.getElementById('msg-rodape');
                if (msg) {
                    msg.style.display = 'none';
                }
            }, 3000);
        </script>
    {% endif %}

</footer>
</html>
